name: CI

on:
  push:
    branches: [master]
  pull_request:

jobs:
  backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
      - name: Lint
        run: uv run ruff check . && uv run ruff format --check .
      - name: Test
        run: uv run pytest

  frontend:
    runs-on: ubuntu-latest
    # Argos authenticates by OIDC rather than a stored token, which needs
    # `id-token: write` on THIS job (inherited grants don't count). Fork PRs, where
    # GitHub blocks OIDC, fall back to tokenless automatically — so contributors
    # get visual checks without anyone provisioning them a secret.
    permissions:
      contents: read
      id-token: write
      pull-requests: read
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Lint
        run: npm run lint && npm run format:check
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      - name: Test
        run: npm run test
      # Captures the component screenshots and uploads them to Argos, which holds
      # the baselines and does the diffing. So this step only proves capture works
      # — an *unapproved visual change* fails Argos' own PR check, not this one.
      # Kept out of `npm test` because capturing is pointless with nowhere to
      # upload to. See frontend/src/test/VRT.md.
      - name: Visual regression
        run: npm run test:vrt
      - name: Build
        run: npm run build
