# Re-mint the visual-regression baselines and commit them back to the branch.
#
# Why this exists: pixel baselines depend on the machine that renders them (font
# rasterisation above all), so they have to be produced by the same environment
# that checks them — a CI runner, not a laptop. This workflow is the sanctioned
# way to say "yes, that visual change was intentional": run it on your branch and
# review the committed PNG diff in the PR.
#
# Vitest makes the guard rails work in our favour: `--update` is required to write
# a baseline at all, and CI otherwise refuses to create missing ones, so the only
# path to a new baseline is a human deliberately triggering this.
# https://vitest.dev/guide/browser/visual-regression-testing
name: Update screenshots

on:
  workflow_dispatch:

# Never rewrite the baselines master is judged against — a UI change gets its
# baselines on the branch that makes it, where they're reviewable in the PR.
jobs:
  update:
    if: github.ref_name != github.event.repository.default_branch
    runs-on: ubuntu-latest
    permissions:
      contents: write
    # One run per branch: two concurrent runs would race to push the same PNGs.
    concurrency:
      group: update-screenshots-${{ github.ref }}
      cancel-in-progress: true
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22.23.1
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
      - name: Install Playwright Chromium
        run: npx playwright install --with-deps chromium
      # `-u` overrides the CI default of refusing to write baselines. Keep this
      # runner identical to the one in ci.yml's "Visual regression" step — the
      # whole point is that the machine that mints and the machine that checks
      # are the same.
      - name: Regenerate baselines
        run: npm run test:vrt -- -u
      - name: Commit
        run: |
          if [ -z "$(git status --porcelain -- '**/__screenshots__/**')" ]; then
            echo "### No screenshot changes — baselines already current" >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add '**/__screenshots__/**'
          git commit -m "test(frontend): update VRT baselines"
          git push
          {
            echo "### Updated baselines"
            echo '```'
            git show --stat --oneline HEAD
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
