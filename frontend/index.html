<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved theme before first paint so there's no flash of the wrong
      // theme on load. Pairs with ThemeToggle (which writes localStorage.theme).
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Paste a recipe link, get just the recipe — no life stories, no pop-ups."
    />
    <title>Parsley — just the recipe</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
