<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Apply the saved theme before first paint so there's no flash of the wrong
      // theme on load. Pairs with ThemeToggle (which writes localStorage.theme).
      try {
        var t = localStorage.getItem("theme");
        if (t === "light" || t === "dark")
          document.documentElement.setAttribute("data-theme", t);
      } catch (e) {}
    </script>
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <!-- Preload so the browser fetches these before it parses index.css and
         discovers the @font-face rules — without this, the fallback font is
         visibly showing until CSS parsing kicks off the font fetch, which is
         the "glitch" fdea881 didn't fix (that commit only killed the layout
         shift, not the visible font swap itself). -->
    <link
      rel="preload"
      href="/fonts/Inter-variable.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <link
      rel="preload"
      href="/fonts/SpaceMono-Regular.woff2"
      as="font"
      type="font/woff2"
      crossorigin
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Match browser chrome to the page background. Tracks OS preference (the
         common case); won't follow the manual toggle without JS. -->
    <meta
      name="theme-color"
      content="#ffffff"
      media="(prefers-color-scheme: light)"
    />
    <meta
      name="theme-color"
      content="#0d1411"
      media="(prefers-color-scheme: dark)"
    />
    <meta
      name="description"
      content="Paste a recipe link, get just the recipe — no life stories, no pop-ups."
    />
    <title>Parsley — just the recipe</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
