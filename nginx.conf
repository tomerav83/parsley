# QA proxy (see docker-compose.yml `proxy` service): mirrors vercel.json's
# same-origin rewrite routing locally — /api/* to the backend, everything else
# to the frontend — so local QA exercises the real prod-shaped routing instead
# of Vite's dev-only proxy.
events {}

http {
    server {
        listen 80;

        location /api/ {
            proxy_pass http://backend:8000;
            proxy_set_header Host $host;
        }

        location / {
            proxy_pass http://frontend:5173;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
        }
    }
}
